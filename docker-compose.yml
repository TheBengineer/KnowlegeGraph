services:
  kg-mcp:
    build: .
    container_name: kg-mcp-server
    ports:
      - "8082:8082"
    volumes:
      - kg-data:/app/data
    environment:
      - KG_DB_PATH=/app/data/kg.db
      - KG_HOST=0.0.0.0
      - KG_PORT=8082
      - KG_LOG_LEVEL=INFO
      - FASTMCP_STATELESS_HTTP=true
      - FASTMCP_SESSION_IDLE_TIMEOUT=1800
      - KG_WORKERS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  kg-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kg-mcp-frontend
    ports:
      - "8080:80"
    depends_on:
      kg-mcp:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kg-data:
